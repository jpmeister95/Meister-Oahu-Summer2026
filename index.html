@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --sand:#F7F1E4; --sand2:#EFE5D0; --card:#FFFFFF;
  --ink:#22352C; --ink2:#6B7A6F; --line:rgba(34,53,44,.13);
  --lagoon:#0F7B72; --lagoon-soft:#E1EFEA; --lagoon-ink:#0B5C56;
  --papaya:#C75A24; --papaya-soft:#FAE9DC;
  --gold:#B98A33; --gold-soft:#F6ECD3; --gold-line:#E3CD9A; --gold-ink:#7A5A1C;
}
*,*::before,*::after{box-sizing:border-box}
.hw{font-family:Inter,ui-sans-serif,system-ui,sans-serif;background:var(--sand);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.hw ::selection{background:var(--gold-soft)}
.disp{font-family:Fraunces,Georgia,serif}
.wrap{max-width:1020px;margin:0 auto;padding:0 16px}
.nav{position:sticky;top:0;z-index:50;background:rgba(247,241,228,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.navin{display:flex;align-items:center;gap:4px;height:56px;overflow-x:auto}
.brand{font-family:Fraunces,Georgia,serif;font-weight:600;font-size:16px;letter-spacing:.05em;margin-right:auto;display:flex;align-items:center;gap:8px;color:var(--lagoon-ink);white-space:nowrap}
.tabbtn{display:flex;align-items:center;gap:6px;border:none;background:transparent;color:var(--ink2);font:inherit;font-size:13px;font-weight:600;padding:8px 11px;border-radius:999px;cursor:pointer;white-space:nowrap}
.tabbtn.on{background:var(--lagoon);color:#fff}
.hw button:focus-visible,.hw a:focus-visible{outline:2px solid var(--lagoon);outline-offset:2px}
.hero{padding:42px 0 6px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
.title{font-family:Fraunces,Georgia,serif;font-weight:500;font-size:clamp(38px,7vw,64px);line-height:1.02;margin:10px 0 12px}
.sub{color:var(--ink2);font-size:15px;max-width:60ch;line-height:1.6}
.sub a{color:var(--lagoon-ink);text-decoration:underline;text-underline-offset:3px}
.statrow{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 4px}
.chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--card);color:var(--ink);text-decoration:none}
.chip.gold{background:var(--gold-soft);border-color:var(--gold-line);color:var(--gold-ink)}
.chip.lag{background:var(--lagoon-soft);border-color:transparent;color:var(--lagoon-ink)}
.chip.pap{background:var(--papaya-soft);border-color:transparent;color:var(--papaya)}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px}
.sect{margin:24px 0}
.h2{font-family:Fraunces,Georgia,serif;font-size:21px;font-weight:600;margin:0;display:flex;align-items:center;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap}
.b-booked{background:var(--lagoon-soft);color:var(--lagoon-ink)}
.b-walkin{border:1px solid var(--lagoon);color:var(--lagoon-ink);background:transparent}
.b-casual{background:var(--sand2);color:#7A6B4A}
.b-act{background:var(--papaya-soft);color:var(--papaya)}
.b-open{background:#ECEBE6;color:var(--ink2)}
.b-gold{background:var(--gold-soft);color:var(--gold-ink)}
.gwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.ggrid{display:grid;grid-template-columns:148px repeat(31,minmax(13px,1fr));row-gap:12px;min-width:660px;position:relative;align-items:center}
.gband{background:var(--gold-soft);border:1px solid var(--gold-line);border-radius:12px;align-self:stretch;display:flex;justify-content:center;align-items:flex-start;padding-top:3px}
.gbandlbl{font-size:10px;font-weight:800;letter-spacing:.08em;color:var(--gold-ink);text-transform:uppercase;white-space:nowrap}
.gbar{height:22px;border-radius:999px;align-self:center;position:relative;z-index:1;display:flex;align-items:center;justify-content:flex-end;padding:0 7px;color:#fff}
.gname{font-size:13px;font-weight:600;line-height:1.2}
.gsub{font-size:11px;color:var(--ink2);margin-top:2px}
.gtick{font-size:10.5px;color:var(--ink2);font-weight:600;white-space:nowrap}
.gtoday{border-left:2px dashed var(--papaya);align-self:stretch;justify-self:start;z-index:2;pointer-events:none}
.chap{margin:36px 0 14px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.cname{font-family:Fraunces,Georgia,serif;font-size:26px;font-weight:600;margin:0}
.chap.gold .cname{color:var(--gold-ink)}
.crange{font-size:12.5px;font-weight:700;color:var(--ink2);letter-spacing:.03em}
.cblurb{width:100%;font-size:13.5px;color:var(--ink2);margin-top:-2px}
.daycard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px 18px;margin-bottom:12px;scroll-margin-top:76px}
.daycard.gold{border-color:var(--gold-line);background:linear-gradient(180deg,#FCF6E8,#FFFFFF 64px)}
.daycard.today{box-shadow:0 0 0 3px var(--lagoon-soft);border-color:var(--lagoon)}
.dhead{display:flex;gap:14px;align-items:flex-start}
.dnum{font-family:Fraunces,Georgia,serif;font-size:42px;font-weight:600;line-height:.92;color:var(--lagoon-ink);min-width:52px}
.daycard.gold .dnum{color:#8F6A22}
.dmeta{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2)}
.crew{display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end;margin-left:auto;max-width:52%}
.crewchip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--ink2)}
.dot{width:7px;height:7px;border-radius:99px;flex:none}
.evrow{display:flex;gap:12px;padding:9px 0;align-items:flex-start}
.evrow+.evrow{border-top:1px dashed var(--line)}
.evic{width:34px;height:34px;border-radius:12px;background:var(--lagoon-soft);color:var(--lagoon-ink);display:flex;align-items:center;justify-content:center;flex:none}
.evt{font-size:14.5px;font-weight:600;line-height:1.35}
.evs{font-size:12.5px;color:var(--ink2);margin-top:1px}
.evnote{margin-top:7px;font-size:12.5px;color:#8A4E22;background:var(--papaya-soft);border-radius:10px;padding:7px 10px;display:flex;gap:7px;align-items:flex-start;line-height:1.45}
.evlink{color:inherit;text-decoration:none}
.evlink:hover{text-decoration:underline;text-underline-offset:3px;text-decoration-color:var(--lagoon);text-decoration-thickness:1.5px}
.evpin{vertical-align:-2px;margin-left:4px;color:var(--lagoon);opacity:.72}
.evlink:hover .evpin{opacity:1}
.dinner{margin-top:8px;padding-top:12px;border-top:1px solid var(--line)}
.filters{display:flex;gap:8px;overflow-x:auto;padding:14px 0 6px;position:sticky;top:56px;z-index:30;background:linear-gradient(180deg,var(--sand) 82%,rgba(247,241,228,0))}
.fbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--card);color:var(--ink2);font:inherit;font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
.fbtn.on{background:var(--ink);border-color:var(--ink);color:#fff}
.searchbox{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:9px 14px;margin-top:10px}
.searchbox input{border:none;outline:none;font:inherit;font-size:14px;background:transparent;width:100%;color:var(--ink)}
.gitem{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:var(--card)}
.gname2{font-size:14.5px;font-weight:600}
.gnote{font-size:12.5px;color:var(--ink2);margin-top:2px;line-height:1.45}
.metachips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.mchip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--sand2);color:#71634A}
.ratepill{font-size:11px;font-weight:800;padding:3px 8px;border-radius:999px;white-space:nowrap}
.r-hi{background:var(--gold-soft);color:var(--gold-ink)}
.r-mid{background:var(--lagoon-soft);color:var(--lagoon-ink)}
.r-lo{background:#F6DFDC;color:#B4372F}
.maplink{color:var(--ink2);flex:none;display:inline-flex;padding:4px;border-radius:8px}
.maplink:hover{color:var(--lagoon-ink);background:var(--lagoon-soft)}
.rowbtn{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;background:transparent;border:none;padding:11px 2px;cursor:pointer;font:inherit;color:inherit}
.rowbtn+.rowbtn,.rowplain+.rowbtn,.rowbtn+.rowplain,.rowplain+.rowplain{border-top:1px dashed var(--line)}
.rowplain{display:flex;gap:12px;align-items:flex-start;padding:11px 2px}
.hoodcard{cursor:pointer;transition:box-shadow .15s,border-color .15s}
.hoodcard.on{border-color:var(--lagoon);box-shadow:0 0 0 3px var(--lagoon-soft)}
.hoodtag{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.kv{display:flex;align-items:center;gap:12px;padding:6px 0}
.kvlabel{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink2);min-width:76px}
.codeval{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:15px;font-weight:600;background:var(--sand2);border:1px solid var(--line);border-radius:8px;padding:3px 11px;letter-spacing:.02em;color:var(--ink);display:inline-block}
.field{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 14px;font:inherit;font-size:14px;background:var(--card);color:var(--ink);outline:none}
.field:focus{border-color:var(--lagoon)}
textarea.field{resize:vertical;min-height:88px;line-height:1.5}
.foot{padding:44px 0 64px;text-align:center;color:var(--ink2);font-size:12.5px}
.fadein{animation:fu .45s ease both}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){.hw *{animation:none!important;transition:none!important}}
